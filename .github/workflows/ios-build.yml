name: iOS Build

on:
  workflow_dispatch:
    inputs:
      app_url:
        description: AIWeb URL injected into the Capacitor shell
        required: false
        default: https://toget.chat
  push:
    branches:
      - main
    paths:
      - '.github/workflows/ios-build.yml'
      - 'ios/**'
      - 'package.json'
      - 'package-lock.json'
      - 'scripts/ensure-ios-assets.sh'
      - 'scripts/sync-shell-config.mjs'
      - 'www/offline.html'
  pull_request:
    paths:
      - '.github/workflows/ios-build.yml'
      - 'ios/**'
      - 'package.json'
      - 'package-lock.json'
      - 'scripts/ensure-ios-assets.sh'
      - 'scripts/sync-shell-config.mjs'
      - 'www/offline.html'

concurrency:
  group: ios-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: '20'
  IOS_SCHEME: App
  IOS_WORKSPACE: ios/App/App.xcworkspace
  IOS_CONFIGURATION: Debug
  TOGET_DEFAULT_APP_URL: https://toget.chat

jobs:
  build-simulator:
    name: Build iOS simulator app
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout minimal iOS build inputs
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            .github/workflows/ios-build.yml
            ios
            package.json
            package-lock.json
            scripts/ensure-ios-assets.sh
            scripts/sync-shell-config.mjs
            www/offline.html
          sparse-checkout-cone-mode: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Print Xcode toolchain
        run: |
          xcodebuild -version
          xcode-select -p

      - name: Install npm dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Inject optional Firebase iOS config
        env:
          IOS_GOOGLE_SERVICE_INFO_PLIST_BASE64: ${{ secrets.IOS_GOOGLE_SERVICE_INFO_PLIST_BASE64 }}
        run: |
          if [ -z "${IOS_GOOGLE_SERVICE_INFO_PLIST_BASE64}" ]; then
            echo "No iOS Firebase plist secret configured, skipping"
            exit 0
          fi
          printf '%s' "$IOS_GOOGLE_SERVICE_INFO_PLIST_BASE64" | base64 --decode > ios/App/App/GoogleService-Info.plist

      - name: Sync Capacitor shell config
        env:
          TOGET_APP_URL: ${{ inputs.app_url || vars.TOGET_APP_URL || env.TOGET_DEFAULT_APP_URL }}
        run: |
          npm run sync:config
          npm run ensure:ios:assets
          npx cap sync ios

      - name: Install CocoaPods dependencies
        working-directory: ios/App
        run: pod install --repo-update

      - name: Build unsigned simulator app
        run: |
          set -o pipefail
          xcodebuild \
            -workspace "$IOS_WORKSPACE" \
            -scheme "$IOS_SCHEME" \
            -configuration "$IOS_CONFIGURATION" \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            CODE_SIGNING_ALLOWED=NO \
            build | tee "$RUNNER_TEMP/xcodebuild-simulator.log"

      - name: Upload simulator app
        uses: actions/upload-artifact@v4
        with:
          name: toget-ios-simulator-app
          path: ${{ runner.temp }}/DerivedData/Build/Products/Debug-iphonesimulator/App.app
          if-no-files-found: error

      - name: Upload simulator build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: toget-ios-simulator-build-log
          path: ${{ runner.temp }}/xcodebuild-simulator.log
          if-no-files-found: error
